<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carrinho</title>
  <link rel="stylesheet" href="/css/main.css">
</head>

<body>

<main class="container">
  <h1>🛒 Seu Carrinho</h1>

  <div id="cartItems"></div>

  <div class="cart-summary">
    <h2>Total: <span id="cartTotal">R$ 0,00</span></h2>

    <!-- CUPOM -->
    <input type="text" id="coupon" placeholder="Cupom de desconto">
    <button onclick="applyCoupon()">Aplicar</button>

    <h3 id="discountValue"></h3>

    <!-- PAGAMENTO -->
    <select id="paymentMethod">
      <option value="credit">Cartão de Crédito</option>
      <option value="pix">PIX (10% OFF)</option>
      <option value="boleto">Boleto</option>
    </select>

    <button onclick="checkout()" class="btn btn-primary w-full mt-3">
      Finalizar Compra
    </button>
  </div>
</main>

<script src="/js/cart.js"></script>
<script src="/js/cart-page.js"></script>

</body>
</html>
