<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>
    <h1>Criar Conta</h1>

    <form id="formCadastro">

      <div id="mensagemErro" class="erro"></div>

      <!-- Nome -->
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" required placeholder="Seu nome completo">

      <!-- Email -->
      <label for="email">E-mail</label>
      <input type="email" id="email" required placeholder="Seu e-mail">

      <!-- Telefone -->
      <label for="telefone">Telefone (opcional)</label>
      <input type="tel" id="telefone" placeholder="(00) 00000-0000">

      <!-- Senha -->
      <label for="senha">Senha</label>
      <input type="password" id="senha" required placeholder="Crie uma senha">

      <!-- Confirmar senha -->
      <label for="confirmarSenha">Confirmar senha</label>
      <input type="password" id="confirmarSenha" required placeholder="Repita a senha">

      <!-- Termos -->
      <div class="checkbox">
        <input type="checkbox" id="termos">
        <label for="termos">Aceito os termos de uso</label>
      </div>

      <!-- Botão -->
      <button type="submit">Cadastrar</button>

      <!-- Link -->
      <div class="link-login">
        Já tem conta? <a href="login.html">Entrar</a>
      </div>

    </form>
    <script src="script.js"></script>
  </main>
</body>
</html>
