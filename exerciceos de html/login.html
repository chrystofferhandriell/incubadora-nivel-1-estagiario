<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" type="text/css" href="/exerciceos de html/css/style.css">
</head>

<body>

  <main>
    <h1>Login</h1>

    <form>
      <!-- Email -->
      <label for="email">E-mail</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        placeholder="Digite seu e-mail" 
        required
      >

      <!-- Senha -->
      <label for="senha">Senha</label>
      <input 
        type="password" 
        id="senha" 
        name="senha" 
        placeholder="Digite sua senha" 
        required
      >

      <!-- Botão -->
      <button type="submit">Entrar</button>

      <!-- Links -->
      <div class="links">
        <a href="#">Esqueci minha senha</a>
        <a href="cadastro.html">Criar conta</a>
      </div>

    </form>

    <script src="/exerciceos de html/javascript/auth.js"></script>
  </main>

</body>
</html>
